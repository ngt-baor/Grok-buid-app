<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <!--
      Dev: Vite injects inline <script type="module"> + HMR (ws).
      script-src 'self' alone blocks those → blank/black window in Electron.
      Production package can tighten further if needed.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' http://127.0.0.1:* http://localhost:* ws://127.0.0.1:* ws://localhost:* wss://127.0.0.1:* wss://localhost:*; worker-src 'self' blob:"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="./icon.svg" />
    <title>Grok Build App</title>
    <!-- Critical scrollbar paint (classic path). Full rules also in styles.css. -->
    <style>
      *::-webkit-scrollbar { width: 8px; height: 8px; background: transparent; -webkit-appearance: none; }
      *::-webkit-scrollbar-track,
      *::-webkit-scrollbar-track-piece { background: transparent; border: none; }
      *::-webkit-scrollbar-thumb {
        background-color: rgba(255, 255, 255, 0.32);
        border-radius: 999px;
        border: 2px solid transparent;
        background-clip: content-box;
        min-height: 32px;
      }
      *::-webkit-scrollbar-thumb:hover { background-color: rgba(255, 255, 255, 0.48); background-clip: content-box; border: 2px solid transparent; }
      *::-webkit-scrollbar-button { display: none; width: 0; height: 0; }
      *::-webkit-scrollbar-corner { background: transparent; }
      html.theme-light *::-webkit-scrollbar-thumb { background-color: rgba(0, 0, 0, 0.28); background-clip: content-box; border: 2px solid transparent; }
      html.theme-light *::-webkit-scrollbar-thumb:hover { background-color: rgba(0, 0, 0, 0.4); background-clip: content-box; border: 2px solid transparent; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
